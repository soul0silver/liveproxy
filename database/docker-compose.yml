
services:
  db:
    image: mysql:latest
    container_name: mysql
    cap_add:
      - SYS_NICE
#    restart: always
    environment:
      - MYSQL_DATABASE=wwproxy
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - '3308:3306'
    volumes:
      - ./db:/var/lib/mysql
#      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  db:
    driver: local